services:
- name: hr-portal
  type: web
  env: python
  buildCommand: pip install -r requirements.txt
  startCommand: python manage.py migrate && python manage.py collectstatic --noinput && gunicorn hr_project.wsgi:application --log-file -
  envVars:
  - key: DEBUG
    value: False
  - key: SECRET_KEY
    generateValue: true
  - key: ALLOWED_HOSTS
    value: your-app-name.onrender.com
  - key: CSRF_TRUSTED_ORIGINS
    value: https://your-app-name.onrender.com