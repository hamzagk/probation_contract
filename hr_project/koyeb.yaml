# Koyeb deployment manifest for the GIK HR Portal.
#
# To deploy from the CLI:
#   koyeb deploy koyeb.yaml
#
# Required env vars (set in the Koyeb dashboard or via `koyeb secrets create`):
#   DATABASE_URL         - Postgres connection string (Neon, Supabase, etc.)
#   REDIS_URL            - Celery broker (Upstash Redis recommended: rediss://...)
#   SECRET_KEY           - Django secret key (generate with: python -c "from django.core.management.utils import get_random_secret_key; print(get_random_secret_key())")
#   EMAIL_HOST_PASSWORD  - SMTP app password (Outlook/Gmail/etc.)
#   CRON_TOKEN           - Long random string shared with cron-job.org
#
# Replace `hamza-marwat/hr-contract` with your GitHub repo path.

apps:
  - name: hr-portal-web
    type: web
    docker:
      build:
        dockerfile: Dockerfile
        context: .
        # Pushed tag is auto-generated by Koyeb on each build.
    routes:
      - path: /
        port: 8000
    health_checks:
      - type: http
        port: 8000
        path: /admin/login/
        interval_seconds: 30
        timeout_seconds: 5
    scalings:
      min: 1
      max: 1
    instance_type: eco-nano
    regions:
      - fra
    env:
      - key: PORT
        value: "8000"
      - key: DEBUG
        value: "False"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: DATABASE_URL
        scope: secret
      - key: REDIS_URL
        scope: secret
      - key: SECRET_KEY
        scope: secret
      - key: ALLOWED_HOSTS
        value: "*.koyeb.app"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://hr-portal-web-<account>.koyeb.app"
      - key: EMAIL_HOST
        value: "smtp.gmail.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        value: "muhammad.hamza@giki.edu.pk"
      - key: EMAIL_HOST_PASSWORD
        scope: secret
      - key: DEFAULT_FROM_EMAIL
        value: "muhammad.hamza@giki.edu.pk"
      - key: HR_EMAIL
        value: "muhammad.hamza@giki.edu.pk"
      - key: CRON_TOKEN
        scope: secret
      - key: OPENAI_API_KEY
        scope: secret

  - name: hr-portal-worker
    type: worker
    docker:
      build:
        dockerfile: Dockerfile
        context: .
    override_command: true
    command: ["celery", "-A", "hr_project", "worker", "-l", "info"]
    scalings:
      min: 1
      max: 1
    instance_type: eco-nano
    regions:
      - fra
    env:
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        scope: secret
      - key: REDIS_URL
        scope: secret
      - key: SECRET_KEY
        scope: secret
      - key: EMAIL_HOST
        value: "smtp.gmail.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        value: "muhammad.hamza@giki.edu.pk"
      - key: EMAIL_HOST_PASSWORD
        scope: secret
      - key: DEFAULT_FROM_EMAIL
        value: "muhammad.hamza@giki.edu.pk"
      - key: OPENAI_API_KEY
        scope: secret
