{% extends 'base.html' %}

{% block title %}Template Content Editor{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Edit Template Content: {{ template.name }}</h2>
    
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="content">Template Content:</label>
            <textarea class="form-control" id="content" name="content" rows="20" cols="80">{{ template_content }}</textarea>
        </div>
        
        <button type="submit" class="btn btn-primary">Save Content</button>
        <a href="{% url 'template_management' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
