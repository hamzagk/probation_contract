{% extends 'base.html' %}

{% block title %}Confirm Delete Template{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Confirm Delete Template</h2>
    
    <p>Are you sure you want to delete the template: <strong>{{ template.name }}</strong>?</p>
    <p>This action cannot be undone.</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'template_management' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
