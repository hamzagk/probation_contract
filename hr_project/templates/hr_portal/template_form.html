{% extends 'base.html' %}

{% block title %}Edit Template{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>Edit Template: {{ template.name }}</h2>
    
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group">
            <label for="name">Template Name:</label>
            <input type="text" class="form-control" id="name" name="name" value="{{ template.name }}" required>
        </div>
        
        <div class="form-group">
            <label for="description">Description:</label>
            <textarea class="form-control" id="description" name="description" rows="3">{{ template.description }}</textarea>
        </div>
        
        <div class="form-group">
            <label for="template_file">Template File:</label>
            <input type="file" class="form-control-file" id="template_file" name="template_file">
            <small class="form-text text-muted">Leave blank to keep the current file</small>
        </div>
        
        <div class="form-check">
            <input type="checkbox" class="form-check-input" id="is_active" name="is_active" {% if template.is_active %}checked{% endif %}>
            <label class="form-check-label" for="is_active">Active</label>
        </div>
        
        <button type="submit" class="btn btn-primary">Update Template</button>
        <a href="{% url 'template_management' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
