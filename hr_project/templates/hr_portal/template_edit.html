{% extends 'base.html' %}

{% block title %}Edit Template - HR Portal{% endblock %}
{% block page_title %}Edit Document Template{% endblock %}

{% block content %}
<div class="bg-white p-6 rounded-xl shadow-md">
    <h3 class="text-lg font-semibold text-gray-800 mb-4">Edit Template</h3>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Template Name</label>
                <input type="text" name="name" value="{{ template.name }}" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Template Type</label>
                <select name="template_type" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="probation_letter" {% if template.template_type == 'probation_letter' %}selected{% endif %}>Probation Letter</option>
                    <option value="service_certificate" {% if template.template_type == 'service_certificate' %}selected{% endif %}>Service Certificate</option>
                    <option value="experience_certificate" {% if template.template_type == 'experience_certificate' %}selected{% endif %}>Experience Certificate</option>
                    <option value="probation_note" {% if template.template_type == 'probation_note' %}selected{% endif %}>Probation Note</option>
                    <option value="offer_letter" {% if template.template_type == 'offer_letter' %}selected{% endif %}>Offer Letter</option>
                    <option value="appointment_letter" {% if template.template_type == 'appointment_letter' %}selected{% endif %}>Appointment Letter</option>
                    <option value="termination_letter" {% if template.template_type == 'termination_letter' %}selected{% endif %}>Termination Letter</option>
                    <option value="transfer_letter" {% if template.template_type == 'transfer_letter' %}selected{% endif %}>Transfer Letter</option>
                    <option value="other" {% if template.template_type == 'other' %}selected{% endif %}>Other</option>
                </select>
            </div>

            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 mb-2">Template File (Optional - leave blank to keep current)</label>
                <input type="file" name="template_file" accept=".docx,.doc,.pdf" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                <p class="mt-1 text-sm text-gray-500">Current file: {{ template.template_file.name|default:"No file" }}</p>
            </div>

            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                <textarea name="description" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" rows="3">{{ template.description }}</textarea>
            </div>
        </div>

        <div class="mt-6">
            <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">
                <i class="fas fa-save mr-2"></i>Save Changes
            </button>
            <a href="{% url 'template_management' %}" class="ml-2 bg-gray-500 text-white px-6 py-2 rounded-lg hover:bg-gray-600 transition">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
